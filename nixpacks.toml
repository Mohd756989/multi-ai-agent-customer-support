[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade",
  "python3.11 -m pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python3.11 -m rag.ingest || echo 'Skipping ingest'"
]

[start]
cmd = "python3.11 -m uvicorn main:app --host 0.0.0.0 --port $PORT"